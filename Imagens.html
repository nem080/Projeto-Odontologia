<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria de Imagens</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #0a3d62;
      padding: 15px;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .voltar {
      display: block;
      margin: 30px auto;
      text-align: center;
    }

    .voltar a {
      text-decoration: none;
      background: #0a3d62;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
    }

  </style>

</head>
<body>

  <header>
    <h2>Galeria de Imagens</h2>
  </header>

  <div class="container">
    <h1>Um pouco do meu dia a dia</h1>

    <div class="galeria">

      <div class="card">
        <img src="img/servicos-img/implante.jpeg" alt="Implante">
        <p>Implantes</p>
      </div>

      <div class="card">
        <img src="img/servicos-img/clareamento.jpeg" alt="Clareamento">
        <p>Clareamento</p>
      </div>

      <div class="card">
        <img src="img/servicos-img/lente.jpeg" alt="Lentes">
        <p>Lentes de contato</p>
      </div>

      <div class="card">
        <img src="img/servicos-img/ortodontia.jpeg" alt="Ortodontia">
        <p>Ortodontia</p>
      </div>

    </div>

    <div class="voltar">
      <a href="index.html">⬅ Voltar ao site</a>
    </div>

  </div>

</body>
</html>
